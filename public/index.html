<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sellerja — Shop the Future</title>
  <meta name="description" content="Sellerja — premium products delivered fast. Electronics, Clothing, Home & Kitchen.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .hero-section {
      position: relative;
      padding: 80px 24px 60px;
      text-align: center;
      overflow: hidden;
    }

    .hero-section::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%; transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse, rgba(245,166,35,0.1) 0%, transparent 65%);
      pointer-events: none;
      animation: heroGlow 5s ease-in-out infinite alternate;
    }

    @keyframes heroGlow {
      from { opacity: 0.6; transform: translateX(-50%) scale(1); }
      to   { opacity: 1;   transform: translateX(-50%) scale(1.08); }
    }

    .hero-title {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 16px;
    }

    .hero-title .line1 {
      display: block;
      background: linear-gradient(135deg, #fff 20%, var(--accent) 60%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-title .line2 {
      display: block;
      background: linear-gradient(135deg, var(--accent-light) 0%, #fff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto 40px;
    }

    .hero-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -1px;
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">Sellerja</a>

    <div class="header-search">
      <span class="search-icon">⌕</span>
      <input type="search" id="header-search" placeholder="Search products..." autocomplete="off">
    </div>

    <nav class="header-nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/orders.html" class="nav-link">Orders</a>
      <a href="/cart.html" class="cart-link">
        🛒 Cart
        <span class="cart-badge" id="cart-badge">0</span>
      </a>
      <span id="user-greeting" class="nav-link" style="display:none;color:var(--text-muted)"></span>
      <div id="auth-area"></div>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero-section">
  <h1 class="hero-title">
    <span class="line1">Shop the Future.</span>
    <span class="line2">Own the Present.</span>
  </h1>
  <p class="hero-sub">Premium products curated for people who demand excellence. Fast shipping, easy returns.</p>

  <div class="hero-stats">
    <div class="stat">
      <div class="stat-num">12+</div>
      <div class="stat-label">Products</div>
    </div>
    <div class="stat">
      <div class="stat-num">3</div>
      <div class="stat-label">Categories</div>
    </div>
    <div class="stat">
      <div class="stat-num">24h</div>
      <div class="stat-label">Fast Delivery</div>
    </div>
    <div class="stat">
      <div class="stat-num">100%</div>
      <div class="stat-label">Secure</div>
    </div>
  </div>
</section>

<!-- MAIN CONTENT -->
<main class="page-wrapper">

  <!-- Category Filters -->
  <div class="filters" id="category-filters">
    <button class="filter-btn active" data-category="All">All Products</button>
    <button class="filter-btn" data-category="Electronics">⚡ Electronics</button>
    <button class="filter-btn" data-category="Clothing">👕 Clothing</button>
    <button class="filter-btn" data-category="Home & Kitchen">🏠 Home & Kitchen</button>
  </div>

  <p class="products-count" id="products-count"></p>

  <!-- Product Grid -->
  <div class="products-grid" id="products-grid"></div>

</main>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2024 <strong>Sellerja</strong>. All rights reserved. Built with ❤️ and good taste.</p>
</footer>

<script src="/js/api.js"></script>
<script src="/js/products.js"></script>
</body>
</html>
