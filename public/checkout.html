<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Sellerja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">Sellerja</a>
    <nav class="header-nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/cart.html" class="cart-link">
        🛒 Cart
        <span class="cart-badge" id="cart-badge">0</span>
      </a>
      <span id="user-greeting" class="nav-link" style="display:none;color:var(--text-muted)"></span>
      <div id="auth-area"></div>
    </nav>
  </div>
</header>

<main class="page-wrapper" id="checkout-main">
  <div class="page-title-bar">
    <a href="/cart.html" class="back-link">← Back to Cart</a>
    <h1>Checkout</h1>
  </div>

  <div class="checkout-layout">
    <!-- LEFT: Shipping Form -->
    <div>
      <form id="checkout-form">
        <div class="checkout-section">
          <h3><span class="step">1</span> Shipping Information</h3>

          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-input" type="text" name="shipping_name" placeholder="John Doe" required>
          </div>

          <div class="form-group">
            <label class="form-label">Delivery Address</label>
            <input class="form-input" type="text" name="shipping_address" placeholder="123 Main Street, Apt 4B" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">City</label>
              <input class="form-input" type="text" name="shipping_city" placeholder="New York" required>
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input class="form-input" type="tel" name="shipping_phone" placeholder="+1 234 567 8900" required>
            </div>
          </div>
        </div>

        <div class="checkout-section">
          <h3><span class="step">2</span> Payment</h3>
          <div style="display:flex;align-items:center;gap:12px;padding:16px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);">
            <span style="font-size:1.5rem;">🔒</span>
            <div>
              <div style="font-weight:600;font-size:0.9rem;">Cash on Delivery</div>
              <div style="font-size:0.8rem;color:var(--text-muted);">Pay when you receive your order. Safe & simple.</div>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
          Place Order 🚀
        </button>
      </form>
    </div>

    <!-- RIGHT: Order Summary -->
    <aside class="order-summary" style="position:sticky;top:calc(var(--header-h) + 24px);">
      <h3>Order Summary</h3>
      <div id="checkout-summary">
        <div class="spinner"></div>
      </div>
    </aside>
  </div>
</main>

<footer class="footer">
  <p>© 2024 <strong>Sellerja</strong>. All rights reserved.</p>
</footer>

<script src="/js/api.js"></script>
<script src="/js/orders.js"></script>
</body>
</html>
