<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sellerja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .btn-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/" class="logo-text" style="font-size:2rem;font-weight:900;
        background:linear-gradient(135deg,var(--accent),var(--accent-light));
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        filter:drop-shadow(0 0 16px rgba(245,166,35,0.5));text-decoration:none;">Sellerja</a>
      <p>Welcome back. Sign in to continue.</p>
    </div>

    <h2>Sign In</h2>
    <p class="subtitle">Enter your credentials to access your account</p>

    <div class="error-message" id="login-error" style="display:none;">
      <span>⚠</span> <span id="login-error-text"></span>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Your password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account?
      <a href="/register.html">Create one free</a>
    </div>

    <div class="divider">or</div>

    <div style="text-align:center;">
      <a href="/" class="btn btn-secondary btn-sm">← Browse without logging in</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  // Fix error message to use the span inside
  const origShowError = window.showError;
  function showError(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    const textEl = document.getElementById(id + '-text');
    if (textEl) textEl.textContent = msg;
    el.style.display = 'flex';
  }
</script>
</body>
</html>
